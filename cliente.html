<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .menu { background: #333; padding: 15px; color: white; margin-bottom: 20px; border-radius: 5px; }
        .menu a { color: white; margin: 0 15px; text-decoration: none; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="menu">
        <a href="index.html">Login</a>
        <a href="cliente.html">Clientes</a>
        <a href="estoque.html">Estoque</a>
        <a href="financeiro.html">Vendas</a>
        <a href="#" onclick="logout()">Sair</a>
    </div>

    <div class="container">
        <h1>Cadastro de Cliente</h1>
        <form id="formCliente">
            <input type="text" id="nome" placeholder="Nome completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="tel" id="telefone" placeholder="Telefone">
            <input type="text" id="cpf" placeholder="CPF">
            <button type="submit">Cadastrar Cliente</button>
        </form>

        <h2>Clientes Cadastrados</h2>
        <table id="tabelaClientes">
            <thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>CPF</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function carregarClientes() {
            const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            const tbody = document.querySelector('#tabelaClientes tbody');
            tbody.innerHTML = '';
            clientes.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${c.nome}</td><td>${c.email}</td><td>${c.telefone}</td><td>${c.cpf}</td>`;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('formCliente').addEventListener('submit', function(e) {
            e.preventDefault();
            const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            clientes.push({
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                cpf: document.getElementById('cpf').value
            });
            localStorage.setItem('clientes', JSON.stringify(clientes));
            alert('Cliente cadastrado com sucesso!');
            this.reset();
            carregarClientes();
        });

        function logout() {
            localStorage.removeItem('logado');
            window.location.href = 'index.html';
        }

        carregarClientes();
    </script>
</body>
</html>
